<header class="nav" [class.scrolled]="isScrolled()">
  <div class="nav-inner container">
    <a routerLink="/" class="brand" (click)="closeMenu()">
      <span class="brand-mark">
        <svg viewBox="0 0 40 40" width="34" height="34" fill="none">
          <circle cx="20" cy="20" r="19" fill="var(--color-primary)"/>
          <path d="M20 10v20M10 20h20" stroke="#fff" stroke-width="3.4" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="brand-text">
        <strong>Advance Surgery</strong>
        <small>Health Care</small>
      </span>
    </a>

    <nav class="links" [class.open]="isMenuOpen()">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" (click)="closeMenu()">Home</a>
      <a routerLink="/about" routerLinkActive="active" (click)="closeMenu()">About Us</a>
      <a href="/#specialities" (click)="closeMenu()">Specialities</a>
      <a href="/#doctors" (click)="closeMenu()">Our Doctors</a>
      <a href="/#reviews" (click)="closeMenu()">Reviews</a>
      <a routerLink="/contact" routerLinkActive="active" (click)="closeMenu()">Contact</a>

      <div class="mobile-cta">
        <a class="btn btn-outline btn-block" [href]="'tel:' + contact.phoneDial">Call Now</a>
        <button class="btn btn-primary btn-block" (click)="contact.openModal(); closeMenu()">Book Appointment</button>
      </div>
    </nav>

    <div class="nav-actions">
      <a class="icon-btn" [href]="'tel:' + contact.phoneDial" aria-label="Call now" title="Call Now">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        <span>Call Now</span>
      </a>
      <button class="btn btn-primary book-btn" (click)="contact.openModal()">Book Appointment</button>
      <button class="hamburger" (click)="toggleMenu()" [class.active]="isMenuOpen()" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</header>
